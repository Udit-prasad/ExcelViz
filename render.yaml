services:
  # 1. Backend Web Service (Node.js)
  - type: web
    name: excelviz-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

  # 2. Frontend Static Site (React)
  - type: web
    name: excelviz-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: build
    routes:
      # Rewrites all requests to index.html for React Router SPA support
      - type: rewrite
        src: /*
        dest: /index.html
